<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric System - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-group-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 576px) {
            .form-group-row {
                grid-template-columns: 1fr;
            }
        }

        .password-toggle {
            cursor: pointer;
            position: absolute;
            right: 10px;
            top: 38px;
            z-index: 10;
            color: #999;
        }

        .password-group {
            position: relative;
        }
    </style>
</head>
<body class="login-page">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-container" style="max-width: 500px;">
            <div class="login-header">
                <h1>Metric System</h1>
                <p>Create Your Account</p>
            </div>

            <form id="signupForm" class="login-form">
                <div class="alert alert-danger alert-dismissible fade hide" id="errorAlert" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    <span id="errorMessage"></span>
                </div>

                <div class="alert alert-success alert-dismissible fade hide" id="successAlert" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    <span id="successMessage"></span>
                </div>

                <div class="form-group-row">
                    <div class="mb-3">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" name="firstName" placeholder="John">
                    </div>
                    <div class="mb-3">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Doe">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="johndoe" required>
                    <small class="form-text text-muted">3-50 characters, letters, numbers, and underscores</small>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">Phone (Optional)</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="+1234567890">
                </div>

                <div class="mb-3 password-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
                    <small class="form-text text-muted">Minimum 6 characters</small>
                </div>

                <div class="mb-3 password-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="agree" name="agree" required>
                    <label class="form-check-label" for="agree">
                        I agree to the <a href="#terms">Terms of Service</a> and <a href="#privacy">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Create Account</button>

                <div class="login-footer" style="text-align: center;">
                    <p>Already have an account? <a th:href="@{/pages/login}">Sign in</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script>
        function togglePassword(fieldId, icon) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function showAlert(type, message) {
            const alertId = type === 'error' ? 'errorAlert' : 'successAlert';
            const messageId = type === 'error' ? 'errorMessage' : 'successMessage';
            
            document.getElementById(messageId).textContent = message;
            const alert = document.getElementById(alertId);
            alert.classList.remove('hide');
            
            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = '/api/pages/login';
                }, 2000);
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate form
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('error', 'Passwords do not match!');
                return;
            }

            if (password.length < 6) {
                showAlert('error', 'Password must be at least 6 characters!');
                return;
            }

            const username = document.getElementById('username').value;
            if (username.length < 3) {
                showAlert('error', 'Username must be at least 3 characters!');
                return;
            }

            // Prepare data
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password,
                confirmPassword: confirmPassword,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                phone: document.getElementById('phone').value
            };

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('success', 'Account created successfully! Redirecting to login...');
                } else {
                    showAlert('error', result.message || 'Registration failed. Please try again.');
                }
            } catch (error) {
                showAlert('error', 'An error occurred. Please try again.');
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
