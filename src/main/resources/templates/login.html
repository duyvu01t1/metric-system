<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-container">
            <div class="login-header">
                <h1>Metric System</h1>
                <p>Tailoring Management System</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="alert alert-danger alert-dismissible fade hide" id="errorAlert" role="alert">
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    <span id="errorMessage"></span>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Username or Email</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>

            <div class="oauth-separator">
                <span>Or login with</span>
            </div>

            <div class="oauth-buttons">
                <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger w-100 mb-2">
                    <i class="fab fa-google"></i> Google
                </a>
                <a th:href="@{/oauth2/authorization/azure}" class="btn btn-outline-info w-100">
                    <i class="fab fa-microsoft"></i> Azure
                </a>
            </div>

            <div class="login-footer">
                <p>Don't have an account? <a th:href="@{/pages/signup}">Sign up</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>
</body>
</html>
